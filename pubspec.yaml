name: ondas_web
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Dependency injection
  get_it: ^8.0.3

  # Navigation
  go_router: ^17.2.1

  # HTTP client
  dio: ^5.8.0+1

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Functional programming (Either)
  dartz: ^0.10.1

  # Internationalization (date formatting)
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:

  uses-material-design: true
